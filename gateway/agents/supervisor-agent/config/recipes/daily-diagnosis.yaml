version: "1.0.0"
title: "Daily Platform Diagnosis"
description: "Automated daily platform health check and diagnosis report"
prompt: |
  Perform a comprehensive platform diagnosis:

  1. Call platform_monitor__get_platform_status to check gateway health and running instances.
  2. Call platform_monitor__get_agents_status to review all agent configurations and their status.
  3. Call platform_monitor__get_observability_data with `hours=24` to analyze traces, latency, errors, and cost.

  If any monitoring tool fails, inspect the MCP log at `${GOOSE_PATH_ROOT}/logs/mcp/platform_monitor.log` before retrying.

  Produce a structured diagnosis report with:
  - Overall health summary
  - Findings with severity levels (CRITICAL / WARNING / INFO)
  - Actionable recommendations
  - Key metrics table
