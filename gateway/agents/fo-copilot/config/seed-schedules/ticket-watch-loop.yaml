version: 1.0.0
title: Ticket watch loop
description: 'Proactive ticket watch loop: pull the tickets waiting on me, judge each, pass the ball on, and report.'
instructions: |
  This is one round of proactive ticket watch (watch), fired by a scheduled task every 30 minutes.
  Each round is independent and stateless. Run the watch skill workflow:
  1. Call ticket.get_todo to pull the list of tickets "waiting on me" (it already carries a concise summary).
  2. Handle each ticket and try to pass the ball on — advance / assign / escalate / close / comment-and-wait / hold.
     For high-risk writes: P1/P2 only propose and await confirmation; P3/P4 execute directly and leave a
     ticket.comment with the reason.
  3. Maintain memory (global scope): write the new agreements that surfaced this round, clean up lapsed entries.
  4. Produce one focused report — the 1-3 most important items, ending with whether the FO lead needs to act.
     If nothing is wrong, report a single line: "all normal, no action needed".
